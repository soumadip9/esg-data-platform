services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: breathe_esg
      POSTGRES_USER: breathe
      POSTGRES_PASSWORD: breathe_dev
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U breathe -d breathe_esg"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: >
      sh -c "python manage.py migrate &&
             python manage.py seed_demo &&
             python manage.py load_samples &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 2 --reload"
    environment:
      DATABASE_URL: postgres://breathe:breathe_dev@db:5432/breathe_esg
      DJANGO_SECRET_KEY: dev-secret-key-change-in-production
      DEBUG: "true"
      ALLOWED_HOSTS: localhost,127.0.0.1,backend
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://localhost:3000,http://localhost
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_TASK_ALWAYS_EAGER: "true"
    volumes:
      - ./backend:/app
      - ./sample_data:/app/sample_data:ro
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:

databases:
  - name: breathe-esg-db
    plan: free
    databaseName: breathe_esg
    user: breathe

services:
  - type: web
    name: breathe-esg-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: breathe-esg-db
          property: connectionString
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "false"
      - key: ALLOWED_HOSTS
        value: breathe-esg-api.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://breathe-esg-web.onrender.com
      - key: CELERY_TASK_ALWAYS_EAGER
        value: "true"
    healthCheckPath: /health/
    buildCommand: ""
    startCommand: >
      python manage.py migrate &&
      python manage.py seed_demo &&
      python manage.py load_samples &&
      gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2

  - type: web
    name: breathe-esg-web
    runtime: docker
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    plan: free
    envVars:
      - key: VITE_API_URL
        value: https://breathe-esg-api.onrender.com/api
